<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Support - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #0f172a 50%, #1a1f35 75%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        .login-container::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(14, 165, 233, 0.1) 0%, transparent 50%);
            animation: moveGradient 15s ease infinite;
            pointer-events: none;
        }

        @keyframes moveGradient {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .form-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border: 1px solid #475569;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 60px rgba(14, 165, 233, 0.1);
            position: relative;
            z-index: 10;
        }

        .flex {
            display: flex;
        }

        .items-center {
            align-items: center;
        }

        .justify-center {
            justify-content: center;
        }

        .min-h-screen {
            min-height: 100vh;
        }

        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }

        /* Tab Styling */
        .tab-btn {
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            color: #94a3b8;
            padding-bottom: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            background: none;
            border: none;
            padding: 0 24px 12px 0;
            margin: 0;
        }

        .tab-btn:hover {
            color: #0ea5e9;
            transform: translateY(-2px);
        }

        .tab-btn.active {
            color: #0ea5e9;
            border-bottom-color: #0ea5e9;
            box-shadow: 0 4px 0 -2px #0ea5e9;
        }

        /* Form Inputs */
        input, textarea {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #475569;
            color: #ffffff !important;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
            width: 100%;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15), inset 0 0 0 1px rgba(14, 165, 233, 0.1);
            background: rgba(15, 23, 42, 1);
        }

        /* Buttons */
        .btn-login {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(14, 165, 233, 0.3);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        /* Messages */
        .error-msg {
            background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
            color: #fecaca;
            padding: 16px;
            border-radius: 8px;
            display: none;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .success-msg {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            color: #86efac;
            padding: 16px;
            border-radius: 8px;
            display: none;
            margin-bottom: 20px;
            border-left: 4px solid #22c55e;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: none;
            border: 3px solid rgba(14, 165, 233, 0.2);
            border-top: 3px solid #0ea5e9;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .link-btn {
            color: #0ea5e9;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            font-size: inherit;
            padding: 0;
            margin: 0;
            transition: color 0.2s ease;
        }

        .link-btn:hover {
            color: #06b6d4;
        }

        /* Tab Content */
        .tab-content {
            animation: fadeIn 0.3s ease-in;
        }

        .tab-content.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logged in message */
        .logged-in-msg {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(22, 163, 74, 0.1) 100%);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #22c55e;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.1);
        }

        .logged-in-msg p {
            margin: 6px 0;
            font-size: 14px;
        }

        .logged-in-msg strong {
            color: #4ade80;
        }

        .logged-in-msg a {
            color: #4ade80;
            text-decoration: underline;
            transition: color 0.2s ease;
        }

        .logged-in-msg a:hover {
            color: #86efac;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Back Link */
        .back-link {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
            display: inline-block;
            margin-top: 16px;
        }

        .back-link:hover {
            color: #0ea5e9;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-card {
                margin: 0 16px;
            }

            .btn-login {
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body class="login-container">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="form-card rounded-xl p-8 w-full max-w-md">
            <!-- Header -->
            <div class="text-center mb-12">
                <div style="font-size: 48px; margin-bottom: 8px;">🎫</div>
                <h1 style="font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;">IT Support</h1>
                <p style="color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Ticketing System</p>
            </div>

            <!-- Already Logged In Message -->
            <div id="logged-in-message" class="logged-in-msg" style="display: none;">
                <p>✅ You are already logged in as:</p>
                <p style="font-weight: 700; color: #4ade80; font-size: 15px;" id="current-user-email"></p>
                <p style="margin-top: 12px; font-size: 13px;">You can <a href="pages/user-portal.html">go to your dashboard</a> or logout to login as a different user.</p>
            </div>

            <!-- Tabs -->
            <div style="display: flex; gap: 32px; margin-bottom: 32px; border-bottom: 2px solid #334155; padding-bottom: 0;">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
            </div>

            <!-- Login Tab -->
            <div id="login-tab" class="tab-content">
                <div id="login-error" class="error-msg"></div>
                <div id="login-success" class="success-msg"></div>

                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="login-email" placeholder="your.email@company.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn-login">
                        <span class="loading-spinner" id="login-spinner"></span>
                        <span id="login-btn-text">Login</span>
                    </button>

                    <p style="color: #94a3b8; font-size: 14px; margin-top: 16px; text-align: center;">
                        Don't have an account? <button type="button" class="link-btn" onclick="switchTab('signup')">Sign up here</button>
                    </p>
                </form>
            </div>

            <!-- Signup Tab -->
            <div id="signup-tab" class="tab-content hidden">
                <div id="signup-error" class="error-msg"></div>
                <div id="signup-success" class="success-msg"></div>

                <form id="signup-form" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name</label>
                        <input type="text" id="signup-name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" id="signup-email" placeholder="your.email@company.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="signup-password" placeholder="At least 6 characters" required minlength="6">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="signup-password-confirm" placeholder="Confirm password" required>
                    </div>

                    <button type="submit" class="btn-login">
                        <span class="loading-spinner" id="signup-spinner"></span>
                        <span id="signup-btn-text">Create Account</span>
                    </button>

                    <p style="color: #94a3b8; font-size: 14px; margin-top: 16px; text-align: center;">
                        Already have an account? <button type="button" class="link-btn" onclick="switchTab('login')">Login here</button>
                    </p>
                </form>
            </div>

            <!-- Back to Home -->
            <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #334155;">
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

    <!-- Config and Auth -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Tab Switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

            document.getElementById(tab + '-tab').classList.remove('hidden');
            event.target.classList.add('active');

            // Clear error messages
            document.getElementById(tab + '-error').style.display = 'none';
            document.getElementById(tab + '-success').style.display = 'none';
        }

        // Show Error Message
        function showError(tabName, message) {
            const errorEl = document.getElementById(tabName + '-error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Show Success Message
        function showSuccess(tabName, message) {
            const successEl = document.getElementById(tabName + '-success');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        // Handle Login
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const spinner = document.getElementById('login-spinner');
            const btnText = document.getElementById('login-btn-text');

            spinner.style.display = 'inline-block';
            btnText.textContent = 'Logging in...';
            document.getElementById('login-form').style.pointerEvents = 'none';

            try {
                const result = await authManager.login(email, password);
                if (result.success) {
                    showSuccess('login', '✅ Login successful! Redirecting...');
                    
                    // Wait a moment for role to be determined, then redirect based on role
                    setTimeout(() => {
                        const isAdmin = authManager.isAdmin();
                        console.log('🔐 User role check:', {
                            email: authManager.getCurrentUserEmail(),
                            isAdmin: isAdmin,
                            userRole: authManager.userRole
                        });
                        
                        if (isAdmin) {
                            console.log('👤 Admin detected - redirecting to admin dashboard');
                            window.location.href = 'pages/admin-dashboard.html';
                        } else {
                            console.log('👥 Employee detected - redirecting to user portal');
                            window.location.href = 'pages/user-portal.html';
                        }
                    }, 500);
                } else {
                    showError('login', '❌ ' + result.error);
                    spinner.style.display = 'none';
                    btnText.textContent = 'Login';
                    document.getElementById('login-form').style.pointerEvents = 'auto';
                }
            } catch (error) {
                showError('login', '❌ ' + error.message);
                spinner.style.display = 'none';
                btnText.textContent = 'Login';
                document.getElementById('login-form').style.pointerEvents = 'auto';
            }
        }

        // Handle Signup
        async function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-password-confirm').value;

            // Validation
            if (password !== confirmPassword) {
                showError('signup', '❌ Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showError('signup', '❌ Password must be at least 6 characters');
                return;
            }

            const spinner = document.getElementById('signup-spinner');
            const btnText = document.getElementById('signup-btn-text');

            spinner.style.display = 'inline-block';
            btnText.textContent = 'Creating account...';
            document.getElementById('signup-form').style.pointerEvents = 'none';

            try {
                const result = await authManager.signup(email, password, name);
                if (result.success) {
                    showSuccess('signup', '✅ Account created! Please login now.');
                    document.getElementById('signup-form').reset();
                    
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('login-email').value = email;
                    }, 1500);
                } else {
                    showError('signup', '❌ ' + result.error);
                    spinner.style.display = 'none';
                    btnText.textContent = 'Create Account';
                    document.getElementById('signup-form').style.pointerEvents = 'auto';
                }
            } catch (error) {
                showError('signup', '❌ ' + error.message);
                spinner.style.display = 'none';
                btnText.textContent = 'Create Account';
                document.getElementById('signup-form').style.pointerEvents = 'auto';
            }
        }

        // Optional: Show message if already logged in
        async function checkAuthStatus() {
            const user = await authManager.waitForAuth();
            if (user) {
                console.log('🔐 Login page: User is logged in as:', user.email);
                console.log('🔐 Login page: User role:', authManager.userRole);
                
                // Show message that user is logged in
                document.getElementById('logged-in-message').style.display = 'block';
                document.getElementById('current-user-email').textContent = user.email;
                
                // Update link based on role
                const dashboardLink = authManager.isAdmin() ? 'pages/admin-dashboard.html' : 'pages/user-portal.html';
                const dashboardName = authManager.isAdmin() ? 'admin dashboard' : 'your portal';
                document.querySelector('#logged-in-message a').href = dashboardLink;
                document.querySelector('#logged-in-message a').textContent = `go to your ${dashboardName}`;
            }
        }

        checkAuthStatus();
    </script>
</body>
</html>
