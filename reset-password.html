<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - IT Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .reset-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #0f172a 50%, #1a1f35 75%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        .reset-container::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(14, 165, 233, 0.1) 0%, transparent 50%);
            animation: moveGradient 15s ease infinite;
            pointer-events: none;
        }

        @keyframes moveGradient {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }

        .form-card {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border: 1px solid #475569;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 60px rgba(14, 165, 233, 0.1);
            position: relative;
            z-index: 10;
        }

        /* Form Inputs */
        input, textarea {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #475569;
            color: #ffffff !important;
            padding: 12px 16px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
            width: 100%;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #0ea5e9;
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15), inset 0 0 0 1px rgba(14, 165, 233, 0.1);
            background: rgba(15, 23, 42, 1);
        }

        /* Buttons */
        .btn-reset {
            background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 15px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(14, 165, 233, 0.3);
        }

        .btn-reset:active {
            transform: translateY(-1px);
        }

        /* Messages */
        .error-msg {
            background: linear-gradient(135deg, #7f1d1d 0%, #991b1b 100%);
            color: #fecaca;
            padding: 16px;
            border-radius: 8px;
            display: none;
            margin-bottom: 20px;
            border-left: 4px solid #dc2626;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .success-msg {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            color: #86efac;
            padding: 16px;
            border-radius: 8px;
            display: none;
            margin-bottom: 20px;
            border-left: 4px solid #22c55e;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
        }

        /* Loading Spinner */
        .loading-spinner {
            display: none;
            border: 3px solid rgba(14, 165, 233, 0.2);
            border-top: 3px solid #0ea5e9;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Loading State */
        .loading-state {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading-spinner-large {
            display: inline-block;
            border: 4px solid rgba(14, 165, 233, 0.2);
            border-top: 4px solid #0ea5e9;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        .loading-state p {
            color: #cbd5e1;
            font-size: 16px;
            margin-top: 12px;
        }

        /* Back Link */
        .back-link {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
            display: inline-block;
            margin-top: 16px;
        }

        .back-link:hover {
            color: #0ea5e9;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-card {
                margin: 0 16px;
            }

            .btn-reset {
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body class="reset-container">
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px;">
        <div class="form-card rounded-xl p-8 w-full max-w-md">
            <!-- Header -->
            <div style="text-align: center; margin-bottom: 32px;">
                <div style="font-size: 48px; margin-bottom: 8px;">🔐</div>
                <h1 style="font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;">Reset Password</h1>
                <p style="color: #94a3b8; font-size: 14px;">Enter your new password below</p>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="loading-state">
                <div class="loading-spinner-large"></div>
                <p>Verifying your reset link...</p>
            </div>

            <!-- Reset Form -->
            <div id="reset-form-container" style="display: none;">
                <div id="reset-error" class="error-msg"></div>
                <div id="reset-success" class="success-msg"></div>

                <p style="color: #cbd5e1; font-size: 14px; margin-bottom: 24px;">
                    Resetting password for: <strong id="reset-email" style="color: #0ea5e9;"></strong>
                </p>

                <form id="reset-form" onsubmit="handlePasswordReset(event)">
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input 
                            type="password" 
                            id="reset-password" 
                            placeholder="Enter new password (min 6 characters)" 
                            required 
                            minlength="6"
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input 
                            type="password" 
                            id="reset-password-confirm" 
                            placeholder="Confirm new password" 
                            required
                        >
                    </div>

                    <button type="submit" class="btn-reset">
                        <span class="loading-spinner" id="reset-spinner"></span>
                        <span id="reset-btn-text">Reset Password</span>
                    </button>
                </form>

                <div style="text-align: center; margin-top: 24px;">
                    <a href="login.html" class="back-link">← Back to Login</a>
                </div>
            </div>

            <!-- Invalid Link State -->
            <div id="invalid-state" style="display: none; text-align: center;">
                <p style="color: #fecaca; font-size: 16px; margin-bottom: 20px;">
                    ❌ This password reset link is invalid or has expired.
                </p>
                <p style="color: #cbd5e1; font-size: 14px; margin-bottom: 20px;">
                    Please request a new password reset from the login page.
                </p>
                <a href="login.html" class="btn-reset" style="text-decoration: none; display: inline-block; width: auto; padding: 12px 24px; margin-top: 16px;">
                    Return to Login
                </a>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

    <!-- Config and Auth -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        let resetCode = null;

        // Initialize when page loads
        async function initializePasswordReset() {
            // Get the oob code from URL parameters
            const params = new URLSearchParams(window.location.search);
            resetCode = params.get('oobCode');

            if (!resetCode) {
                console.error('❌ No reset code provided');
                showInvalidLink();
                return;
            }

            console.log('🔑 Reset code found:', resetCode.substring(0, 10) + '...');

            // Wait for auth to be ready
            await authManager.waitForAuth();

            // Verify the reset code
            const result = await authManager.verifyPasswordResetCode(resetCode);
            
            if (result.success) {
                console.log('✅ Reset code verified for:', result.email);
                document.getElementById('reset-email').textContent = result.email;
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('reset-form-container').style.display = 'block';
            } else {
                console.error('❌ Code verification failed:', result.error);
                showError('reset', '❌ ' + result.error);
                showInvalidLink();
            }
        }

        // Show error message
        function showError(tabName, message) {
            const errorEl = document.getElementById(tabName + '-error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        // Show success message
        function showSuccess(tabName, message) {
            const successEl = document.getElementById(tabName + '-success');
            successEl.textContent = message;
            successEl.style.display = 'block';
        }

        // Show invalid link UI
        function showInvalidLink() {
            document.getElementById('loading-state').style.display = 'none';
            document.getElementById('reset-form-container').style.display = 'none';
            document.getElementById('invalid-state').style.display = 'block';
        }

        // Handle password reset
        async function handlePasswordReset(e) {
            e.preventDefault();

            if (!resetCode) {
                showError('reset', '❌ No reset code found');
                return;
            }

            const newPassword = document.getElementById('reset-password').value;
            const confirmPassword = document.getElementById('reset-password-confirm').value;

            // Validation
            if (newPassword !== confirmPassword) {
                showError('reset', '❌ Passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                showError('reset', '❌ Password must be at least 6 characters');
                return;
            }

            const spinner = document.getElementById('reset-spinner');
            const btnText = document.getElementById('reset-btn-text');

            spinner.style.display = 'inline-block';
            btnText.textContent = 'Resetting...';
            document.getElementById('reset-form').style.pointerEvents = 'none';

            try {
                const result = await authManager.confirmPasswordReset(resetCode, newPassword);
                if (result.success) {
                    showSuccess('reset', '✅ ' + result.message);
                    document.getElementById('reset-form').reset();
                    
                    // Show link to login page
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError('reset', '❌ ' + result.error);
                    spinner.style.display = 'none';
                    btnText.textContent = 'Reset Password';
                    document.getElementById('reset-form').style.pointerEvents = 'auto';
                }
            } catch (error) {
                showError('reset', '❌ ' + error.message);
                spinner.style.display = 'none';
                btnText.textContent = 'Reset Password';
                document.getElementById('reset-form').style.pointerEvents = 'auto';
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 Reset password page loaded');
            initializePasswordReset();
        });
    </script>
    <script src="js/theme.js"></script>
</body>
</html>
